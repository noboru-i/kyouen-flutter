name: kyouen_flutter
description: A new Flutter project.
publish_to: "none"

version: 4.1.3+561

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: 3.44.1

dependencies:
  app_links: ^7.1.1
  app_tracking_transparency: ^2.0.7
  chopper: ^8.6.0
  firebase_analytics: ^12.4.2
  firebase_auth: ^6.5.2
  firebase_core: ^4.10.0
  firebase_crashlytics: ^5.2.3
  firebase_messaging: ^16.3.0
  firebase_performance: ^0.11.4
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_web_plugins:
    sdk: flutter
  freezed_annotation: ^3.1.0
  google_mobile_ads: ^8.0.0
  http: ^1.6.0
  intl: ^0.20.2
  json_annotation: ^4.12.0
  kyouen: ^0.0.2
  logger: ^2.7.0
  package_info_plus: ^10.1.0
  path: ^1.9.1
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.5
  sqflite: ^2.4.3
  sqflite_common_ffi_web: ^1.1.2
  web: ^1.1.1

dev_dependencies:
  build_runner: ^2.15.0
  chopper_generator: ^8.6.2
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  image: ^4.9.1
  integration_test:
    sdk: flutter
  json_serializable: ^6.14.0
  pedantic_mono: ^1.37.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3

flutter:
  config:
    enable-swift-package-manager: true

  uses-material-design: true

  generate: true

  assets:
    - assets/icons/
    - assets/privacy_policy.md
    - assets/terms_of_service.md

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "assets/icons/ic_launcher_background.png"
  adaptive_icon_foreground: "assets/icons/ic_launcher_foreground.png"
  remove_alpha_ios: true
