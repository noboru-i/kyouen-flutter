name: kyouen_flutter
description: A new Flutter project.
publish_to: "none"

version: 4.0.0+561

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: 3.41.6

dependencies:
  app_links: ^6.3.4
  chopper: ^8.5.1
  firebase_analytics: ^12.2.0
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  firebase_crashlytics: ^5.1.0
  firebase_messaging: ^16.1.3
  firebase_performance: ^0.11.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_web_plugins:
    sdk: flutter
  freezed_annotation: ^3.1.0
  http: ^1.6.0
  json_annotation: ^4.11.0
  kyouen: ^0.0.1
  logger: ^2.7.0
  package_info_plus: ^8.3.0
  path: ^1.9.1
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2
  sqflite_common_ffi_web: ^1.1.1

dev_dependencies:
  build_runner: ^2.13.1
  chopper_generator: ^8.6.1
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  pedantic_mono: ^1.36.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3

flutter:
  config:
    enable-swift-package-manager: true

  uses-material-design: true

  generate: true

  assets:
    - assets/icons/
    - assets/privacy_policy.md

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "assets/icons/ic_launcher_background.png"
  adaptive_icon_foreground: "assets/icons/ic_launcher_foreground.png"
  remove_alpha_ios: true
