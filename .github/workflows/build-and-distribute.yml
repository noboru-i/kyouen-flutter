name: Build and Distribute

run-name: Build and Distribute @${{ github.event.inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to build for'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  prepare:
    name: Prepare Build Environment
    runs-on: macos-26
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Setup Flutter and Firebase
        uses: ./.github/actions/setup-flutter-firebase
        with:
          environment: ${{ github.event.inputs.environment }}
          firebase-service-account-key: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
      
      - name: Upload prepared source
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prepared-source-${{ github.event.inputs.environment }}
          path: |
            .
            !.git
            !.github
          include-hidden-files: true
          retention-days: 1

  build-ios:
    name: Build iOS App
    runs-on: macos-26
    environment: ${{ github.event.inputs.environment }}
    needs: prepare
    
    steps:
      - name: Download prepared source
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: prepared-source-${{ github.event.inputs.environment }}
          path: .
      
      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version-file: 'pubspec.yaml'
          channel: 'stable'
      
      - name: Install FlutterFire CLI
        run: dart pub global activate flutterfire_cli
      
      - name: Set script permissions
        run: chmod +x ios/scripts/extract_dart_defines.sh ios/scripts/generate_provisioning_config.sh
      
      - name: Generate provisioning profile configuration
        run: ios/scripts/generate_provisioning_config.sh ${{ github.event.inputs.environment }}
      
      - name: Install Apple Certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # Extract UUID from provisioning profile and use it as filename
          PP_UUID=$(security cms -D -i $PP_PATH | grep -A1 UUID | grep string | sed -e 's/<[^>]*>//g' | tr -d '\t ')
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

      - name: Set up App Store Connect API Key
        if: ${{ github.event.inputs.environment == 'prod' }}
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8

      - name: Build iOS IPA
        run: |
          if [ "${{ github.event.inputs.environment }}" = "dev" ]; then
            flutter build ipa --dart-define-from-file=.env.dev \
                --release \
                --verbose \
                --export-options-plist=ios/ExportOptions.dev.plist \
                --build-number=$((560 + ${{ github.run_number }}))
          else
            flutter build ipa --dart-define-from-file=.env.prod \
                --release \
                --verbose \
                --export-options-plist=ios/ExportOptions.prod.plist \
                --build-number=$((560 + ${{ github.run_number }}))
          fi

      - name: Prepare iOS artifact
        run: |
          IPA_PATH=$(find build/ios/ipa -name '*.ipa' | head -1)
          mkdir -p dist
          cp "$IPA_PATH" "dist/kyouen-ios-${{ github.event.inputs.environment }}.ipa"

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: dist/kyouen-ios-${{ github.event.inputs.environment }}.ipa
          archive: false
          if-no-files-found: error
      
      - name: Upload IPA to App Store Connect
        if: ${{ github.event.inputs.environment == 'prod' }}
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_PATH=$(find build/ios/ipa -name '*.ipa' | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Install Firebase CLI
        if: ${{ github.event.inputs.environment == 'dev' }}
        run: npm install -g firebase-tools@15.7.0

      - name: Distribute to Firebase App Distribution (iOS)
        if: ${{ github.event.inputs.environment == 'dev' }}
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          SERVICE_ACCOUNT_FILE="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s\n' "$FIREBASE_SERVICE_ACCOUNT_KEY" > "$SERVICE_ACCOUNT_FILE"
          chmod 600 "$SERVICE_ACCOUNT_FILE"
          export GOOGLE_APPLICATION_CREDENTIALS="$SERVICE_ACCOUNT_FILE"
          firebase appdistribution:distribute build/ios/ipa/*.ipa \
            --app ${{ secrets.FIREBASE_IOS_APP_ID }} \
            --groups testers \
            --release-notes "Build from GitHub Actions - iOS ${{ github.event.inputs.environment }}"
          rm -f "$SERVICE_ACCOUNT_FILE"

      - name: Clean up keychain and provisioning profile
        if: ${{ always() }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision
          rm -f ~/.appstoreconnect/private_keys/AuthKey_*.p8

  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    needs: prepare
    
    steps:
      - name: Download prepared source
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: prepared-source-${{ github.event.inputs.environment }}
          path: .
      
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'microsoft'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version-file: 'pubspec.yaml'
          channel: 'stable'
      
      - name: Setup Android keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Decode and save keystore
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > android/app/cert/release.keystore
          
          # Set environment variables for Gradle
          echo "STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> $GITHUB_ENV
          echo "KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> $GITHUB_ENV
      
      - name: Build Android APK
        if: ${{ github.event.inputs.environment == 'dev' }}
        run: |
          flutter build apk --dart-define-from-file=.env.dev \
              --release \
              --verbose \
              --build-number=$((560 + ${{ github.run_number }}))
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            dist/kyouen-android-dev.apk

      - name: Build Android AAB
        if: ${{ github.event.inputs.environment == 'prod' }}
        run: |
          flutter build appbundle --dart-define-from-file=.env.prod \
              --release \
              --verbose \
              --build-number=$((560 + ${{ github.run_number }}))
          mkdir -p dist
          cp build/app/outputs/bundle/release/app-release.aab \
            dist/kyouen-android-prod.aab

      - name: Upload Android APK artifact
        if: ${{ github.event.inputs.environment == 'dev' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: dist/kyouen-android-dev.apk
          archive: false
          if-no-files-found: error

      - name: Upload Android AAB artifact
        if: ${{ github.event.inputs.environment == 'prod' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: dist/kyouen-android-prod.aab
          archive: false
          if-no-files-found: error

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.7.0

      - name: Distribute APK to Firebase App Distribution (Android)
        if: ${{ github.event.inputs.environment == 'dev' }}
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          SERVICE_ACCOUNT_FILE="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s\n' "$FIREBASE_SERVICE_ACCOUNT_KEY" > "$SERVICE_ACCOUNT_FILE"
          chmod 600 "$SERVICE_ACCOUNT_FILE"
          export GOOGLE_APPLICATION_CREDENTIALS="$SERVICE_ACCOUNT_FILE"
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
            --app ${{ secrets.FIREBASE_ANDROID_APP_ID }} \
            --groups testers \
            --release-notes "Build from GitHub Actions - Android ${{ github.event.inputs.environment }}"
          rm -f "$SERVICE_ACCOUNT_FILE"

      - name: Distribute AAB to Firebase App Distribution (Android)
        if: ${{ github.event.inputs.environment == 'prod' }}
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          SERVICE_ACCOUNT_FILE="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s\n' "$FIREBASE_SERVICE_ACCOUNT_KEY" > "$SERVICE_ACCOUNT_FILE"
          chmod 600 "$SERVICE_ACCOUNT_FILE"
          export GOOGLE_APPLICATION_CREDENTIALS="$SERVICE_ACCOUNT_FILE"
          firebase appdistribution:distribute build/app/outputs/bundle/release/app-release.aab \
            --app ${{ secrets.FIREBASE_ANDROID_APP_ID }} \
            --groups testers \
            --release-notes "Build from GitHub Actions - Android ${{ github.event.inputs.environment }}"
          rm -f "$SERVICE_ACCOUNT_FILE"

  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    needs: prepare

    steps:
      - name: Download prepared source
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: prepared-source-${{ github.event.inputs.environment }}
          path: .

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version-file: 'pubspec.yaml'
          channel: 'stable'

      - name: Build web app
        run: flutter build web --release --dart-define-from-file=.env.${{ github.event.inputs.environment }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.7.0

      - name: Set Firebase Hosting config for environment
        run: cp firebase.${{ github.event.inputs.environment }}.json firebase.json

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          SERVICE_ACCOUNT_FILE="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s\n' "$FIREBASE_SERVICE_ACCOUNT_KEY" > "$SERVICE_ACCOUNT_FILE"
          chmod 600 "$SERVICE_ACCOUNT_FILE"
          export GOOGLE_APPLICATION_CREDENTIALS="$SERVICE_ACCOUNT_FILE"
          firebase deploy --only hosting \
            --project ${{ github.event.inputs.environment == 'dev' && 'api-project-732262258565' || 'my-android-server' }} \
            --non-interactive
          rm -f "$SERVICE_ACCOUNT_FILE"
